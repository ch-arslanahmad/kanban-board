<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Kanban Board</h1>
      <button id="add-task">Add Task</button>
    </header>

    <main>
      <section class="board">
        <div class="card">
          <button class="status" id="todo">todo</button>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>

        <div class="card">
          <button class="status" id="in-progress">in-progress</button>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>

        <div class="card">
          <button class="status" id="done">done</button>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
