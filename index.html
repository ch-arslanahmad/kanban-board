<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="icon" type="image/png" href="logo-transparent.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <header>
      <img src="logo-transparent.png" alt="Kanban Board logo" height="100" />
      <!-- <h1>Kanban</h1> -->

      <div class="buttons">
        <button id="add-task">Add <i class="fa-solid fa-plus"></i></button>
        <!--currently the undo button non-functional  -->
        <button id="undo-task" disabled>
          <i class="fa-solid fa-undo"></i>
        </button>
      </div>
    </header>

    <main>
      <section class="board">
        <!-- here data-* is a custom acceptable attribute, letting you to store extra info of an element -->
        <div class="column" data-status="todo">
          <h2>Todo</h2>
          <div class="card-list">
            <!-- dynamically populated -->
          </div>
        </div>

        <div class="column" data-status="in-progress">
          <h2>In Progress</h2>
          <div class="card-list">
            <!-- dynamically populated -->
          </div>
        </div>

        <div class="column" data-status="done">
          <h2>Done</h2>
          <div class="card-list">
            <!-- dynamically populated -->
          </div>
        </div>
      </section>

      <dialog class="task-modal">
        <form class="dialog-content" method="dialog">
          <div class="dialog-header">
            <h2>Add Task</h2>
            <button
              type="button"
              id="modal-close"
              class="dialog-close"
              aria-label="Close">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <fieldset class="input-section">
            <label for="task-title"> Title </label>
            <input type="text" id="task-title" required />
            <label for="task-desc"> Description </label>
            <textarea id="task-desc" rows="3"></textarea>
          </fieldset>

          <div class="modal-actions">
            <button type="button" id="modal-cancel" class="btn-secondary">
              Cancel
            </button>
            <button type="submit" id="modal-confirm" value="add">
              Add <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </form>
      </dialog>
    </main>
  </body>
  <script src="main.js"></script>
</html>
