<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Kanban Board</h1>
      <button id="add-task">Add Task</button>
    </header>

    <main>
      <section class="board">
        <div class="card">
          <button class="status" id="todo">todo</button>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>

        <div class="card">
          <button class="status" id="in-progress">in-progress</button>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>

        <div class="card">
          <button class="status" id="done">done</button>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>
      </section>

      <dialog class="task-modal">
        <form class="dialog-content" method="dialog">
          <h2>Add Task</h2>

          <fieldset class="input-section">
            <label for="task-title"> Title </label>
            <input type="text" id="task-title" required />
            <label for="task-desc"> Description </label>
            <textarea id="task-desc" rows="3"></textarea>
          </fieldset>

          <div class="modal-actions">
            <button type="button" id="modal-cancel" class="btn-secondary">
              Cancel
            </button>
            <button type="submit" id="modal-confirm" value="add">Add</button>
          </div>
        </form>
      </dialog>
    </main>
    <script src="main.js"></script>
  </body>
</html>
