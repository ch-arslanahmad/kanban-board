<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <header>
      <h1>Kanban</h1>

      <div class="buttons">
        <button id="add-task">Add <i class="fa-solid fa-plus"></i></button>
        <!--currently the undo button non-functional  -->
        <button id="undo-task" disabled>
          <i class="fa-solid fa-undo"></i>
        </button>
      </div>
    </header>

    <main>
      <section class="board">
        <div class="card">
          <div class="card-header">
            <button class="status" id="todo">todo</button>
            <button class="card-delete" aria-label="Delete task">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <button class="status" id="in-progress">in-progress</button>
            <button class="card-delete" aria-label="Delete task">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <button class="status" id="done">done</button>
            <button class="card-delete" aria-label="Delete task">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
          <div class="content">
            <h3>Task Title</h3>
            <p>Task description goes here.</p>
          </div>
        </div>
      </section>

      <dialog class="task-modal">
        <form class="dialog-content" method="dialog">
          <div class="dialog-header">
            <h2>Add Task</h2>
            <button
              type="button"
              id="modal-close"
              class="dialog-close"
              aria-label="Close">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <fieldset class="input-section">
            <label for="task-title"> Title </label>
            <input type="text" id="task-title" required />
            <label for="task-desc"> Description </label>
            <textarea id="task-desc" rows="3"></textarea>
          </fieldset>

          <div class="modal-actions">
            <button type="button" id="modal-cancel" class="btn-secondary">
              Cancel
            </button>
            <button type="submit" id="modal-confirm" value="add">
              Add <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </form>
      </dialog>
    </main>
    <script src="main.js"></script>
  </body>
</html>
